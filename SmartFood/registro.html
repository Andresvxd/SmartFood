<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro - SmartFood</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/styles.css">

</head>

<body class="login-body">

<section class="hero-section d-flex align-items-center">

    <div class="hero-overlay"></div>

    <div class="container position-relative z-1">

        <div class="row justify-content-center min-vh-100 align-items-center">

            <div class="col-lg-5">

                <div class="login-card">

                    <div class="login-header">

                        <div class="login-logo">
                            🍽️
                        </div>

                        <h2>Crear cuenta</h2>

                        <p>
                            Regístrate en SmartFood
                        </p>

                    </div>

                    <div class="login-body-inner">

                        <form id="registroForm">

                            <div class="mb-3">

                                <label class="form-label">
                                    Nombre completo
                                </label>

                                <div class="input-group sf-input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-person"></i>
                                    </span>

                                    <input
                                        type="text"
                                        id="nombre"
                                        class="form-control sf-input"
                                        placeholder="Nombre completo"
                                        required>

                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Correo electrónico
                                </label>

                                <div class="input-group sf-input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-envelope"></i>
                                    </span>

                                    <input
                                        type="email"
                                        id="correo"
                                        class="form-control sf-input"
                                        placeholder="correo@ejemplo.com"
                                        required>

                                </div>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Contraseña
                                </label>

                                <div class="input-group sf-input-group">

                                    <span class="input-group-text">
                                        <i class="bi bi-lock"></i>
                                    </span>

                                    <input
                                        type="password"
                                        id="password"
                                        class="form-control sf-input"
                                        placeholder="********"
                                        required>

                                </div>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-sf w-100">

                                <i class="bi bi-person-plus me-2"></i>
                                Registrarse

                            </button>

                        </form>

                        <div class="text-center mt-4">

                            <span class="text-muted">
                                ¿Ya tienes cuenta?
                            </span>

                            <br>

                            <a href="index.html"
                               class="text-accent fw-bold text-decoration-none">

                                Iniciar sesión

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/registro.js"></script>

</body>
</html>
