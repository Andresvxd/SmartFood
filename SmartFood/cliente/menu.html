<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartFood – Menú</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/styles.css"/>

</head>

<body class="dashboard-body">

  <!-- SIDEBAR -->
  <aside class="sf-sidebar">

    <div class="sidebar-logo">
      <div class="logo-icon">🍽️</div>
      <span>SmartFood</span>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section-title">Menú</div>

      <a href="menu.html" class="sf-nav-link active">
        <i class="bi bi-grid"></i>
        Menú & Pedidos
      </a>

      <div class="nav-section-title">Cuenta</div>

      <a href="../backend/logout.php" class="sf-nav-link">
        <i class="bi bi-box-arrow-right"></i>
        Cerrar sesión
      </a>

    </nav>

  </aside>

  <!-- MAIN -->
  <main class="sf-main">

    <div class="sf-topbar">

      <div class="d-flex align-items-center gap-3">

        <button class="d-lg-none topbar-btn">
          <i class="bi bi-list"></i>
        </button>

        <span class="topbar-title">
          Menú & Pedidos
        </span>

      </div>

      <div class="topbar-actions">

        <button class="topbar-btn"
                data-bs-toggle="offcanvas"
                data-bs-target="#cartOffcanvas">

          <i class="bi bi-cart3"></i>

          <span class="cart-badge"
                id="topCartBadge">
            0
          </span>

        </button>

      </div>

    </div>

    <div class="sf-content">

      <!-- BUSCADOR -->
      <div class="d-flex flex-wrap gap-2 align-items-center mb-4">

        <input type="text"
               class="sf-search"
               id="menuSearch"
               placeholder="🔍 Buscar producto..."
               oninput="filterMenu()"
               style="min-width:220px;"/>

        <div id="catFilters"
             class="d-flex flex-wrap gap-2"></div>

      </div>

      <!-- PRODUCTOS -->
      <div class="row g-3"
           id="menuGrid"></div>

    </div>

  </main>

  <!-- CARRITO -->
  <div class="offcanvas offcanvas-end offcanvas-dark"
       tabindex="-1"
       id="cartOffcanvas"
       style="width:400px;">

    <div class="offcanvas-header">

      <h5 class="offcanvas-title">

        <i class="bi bi-cart3 me-2"
           style="color:var(--sf-orange)"></i>

        Tu carrito

      </h5>

      <button type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"></button>

    </div>

    <div class="offcanvas-body d-flex flex-column p-0">

      <div class="flex-1 overflow-auto p-3"
           id="cartItemsList"
           style="flex:1;"></div>

      <div class="p-3"
           style="border-top:1px solid rgba(255,255,255,0.07);">

        <div class="d-flex justify-content-between align-items-center mb-3">

          <span style="color:rgba(255,255,255,0.6);">
            Total
          </span>

          <span id="cartTotal"
                style="font-family:'Syne',sans-serif;
                font-size:1.4rem;
                font-weight:800;
                color:var(--sf-orange);">
            $0
          </span>

        </div>

        <div class="d-flex gap-2">

          <button class="btn-sf-outline flex-1"
                  onclick="Cart.clear();Cart.render('cartItemsList')">
            Vaciar
          </button>

          <a href="pago.html"
             class="btn btn-sf flex-1 text-center text-decoration-none"
             style="padding:10px;">

            <i class="bi bi-credit-card me-1"></i>
            Pagar

          </a>

        </div>

      </div>

    </div>

  </div>

  <!-- CHATBOT -->
  <button id="chatbotBtn"
          onclick="toggleChatbot()">
    <i class="bi bi-robot"></i>
  </button>

  <div id="chatbotWindow">

    <div class="chatbot-header">

      <span class="chatbot-avatar">🤖</span>

      <div class="chatbot-header-info">
        <h6>Asistente SmartFood</h6>
        <small>En línea • IA integrada</small>
      </div>

      <button class="chatbot-close"
              onclick="toggleChatbot()">
        <i class="bi bi-x-lg"></i>
      </button>

    </div>

    <div class="chatbot-messages"
         id="chatMessages"></div>

    <div class="chatbot-input-area">

      <input type="text"
             id="chatInput"
             placeholder="Ej: agrega 2 hamburguesas..."
             onkeydown="if(event.key==='Enter')sendChat()"/>

      <button class="chatbot-send"
              onclick="sendChat()">
        <i class="bi bi-send"></i>
      </button>

    </div>

  </div>

  <div id="sfToast"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/cart.js"></script>
  <script src="../js/chatbot.js"></script>

  <script>

    function formatPrice(value) {
      return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP'
      }).format(value);
    }

    function showToast(message) {
      const toast = document.getElementById('sfToast');
      toast.innerHTML = message;
      toast.style.opacity = '1';
      setTimeout(() => {
        toast.style.opacity = '0';
      }, 2500);
    }

    Cart.load();
    Cart.updateBadge();

    let allProducts = [];
    let activeCategory = 'Todos';

    async function cargarProductos() {
      try {
        const response = await fetch('../backend/productos.php');
        allProducts = await response.json();
        renderCategorias();
        filterMenu();
      } catch(error) {
        console.error(error);
      }
    }

    function renderCategorias() {
      const cats = [
        'Todos',
        ...new Set(allProducts.map(p => p.categoria))
      ];

      document.getElementById('catFilters').innerHTML = cats.map(c => `
        <button class="feature-chip ${c === activeCategory ? 'active-chip' : ''}"
                onclick="setCategory('${c}')">
          ${c}
        </button>
      `).join('');
    }

    function setCategory(cat) {
      activeCategory = cat;
      filterMenu();
    }

    function filterMenu() {
      const q = document.getElementById('menuSearch').value.toLowerCase();

      let products = activeCategory === 'Todos'
        ? allProducts
        : allProducts.filter(p => p.categoria === activeCategory);

      if(q){
        products = products.filter(p =>
          p.nombre.toLowerCase().includes(q) ||
          p.descripcion.toLowerCase().includes(q)
        );
      }

      document.getElementById('menuGrid').innerHTML = products.map(p => `
        <div class="col-6 col-md-4 col-lg-3">
          <div class="menu-card">
            <div class="menu-card-img">
              <img src="../${p.imagen}"
                   style="width:100%;
                          height:180px;
                          object-fit:cover;
                          border-radius:20px;">
            </div>
            <div class="menu-card-body">
              <div class="menu-card-name">${p.nombre}</div>
              <div class="menu-card-desc">${p.descripcion}</div>
              <div class="menu-card-price">${formatPrice(p.precio)}</div>
            </div>
            <div class="menu-card-footer">
              <span class="badge-sf-success">${p.categoria}</span>
              <button class="btn-sf-sm"
                      onclick="addToCartFromCard(${p.id})">
                <i class="bi bi-cart-plus"></i>
                Agregar
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function addToCartFromCard(id) {
      const producto = allProducts.find(p => p.id == id);
      if(!producto) return;
      Cart.add(producto);
      Cart.render('cartItemsList');
    }

    Cart.render('cartItemsList');
    cargarProductos();

  </script>

</body>
</html>
